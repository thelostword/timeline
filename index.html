<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="https://github.com/thelostword" />
  <title>timeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050505; display: flex; flex-direction: column; gap: 24px; padding: 24px; font-family: 'Courier New', monospace; color: #7a7a7a; }
    /* canvas { display: block; width: 100%; } */
    .info { font-size: 11px; display: flex; flex-direction: column; gap: 4px; }
    .info strong { color: #a0a060; }
    h3 { font-size: 11px; color: #555; margin-bottom: 8px; letter-spacing: 0.08em; }
    .canvas-wrap { width: 100%; height: 70px;}
  </style>
</head>
<body>
  <div class="canvas-wrap">
    <canvas id="TimelineModern" height="64"></canvas>
  </div>

  <div class="info">
    <div>current time: <strong id="TimeValue"></strong></div>
    <div>range: <strong id="TimeRange"></strong></div>
    <div>ms/px: <strong id="MsPerPixel"></strong></div>
  </div>

  <h3>DEFAULT THEME</h3>
  <div>
    <canvas id="TimelineDefault"></canvas>
  </div>

  <script type="module">
    import TimeLine, { format } from './dist/timeline.es.js';

    // --- Modern theme demo ---
    // const modernCanvas = document.querySelector('#TimelineModern');
    // modernCanvas.width = modernCanvas.parentElement.clientWidth;

    const currentTime = new Date('2025-08-28T21:44:03').getTime();

    const modern = new TimeLine('#TimelineModern', {
      fill: true,
      zoom: 4,
      theme: 'modern',
    });

    modern.draw({
      currentTime,
      areas: [{
        startTime: currentTime,
        endTime: currentTime + 3600000,
      }],
    });

    const TimeValue = document.querySelector('#TimeValue');
    TimeValue.textContent = format(modern.getCurrentTime(), 'MM/DD/YYYY HH:mm:ss');

    const TimeRange = document.querySelector('#TimeRange');
    const timeRange = modern.getTimeRange();
    TimeRange.textContent = timeRange
      ? `${format(timeRange[0], 'HH:mm:ss')} ~ ${format(timeRange[1], 'HH:mm:ss')}`
      : 'Undefined';

    const MsPerPixel = document.querySelector('#MsPerPixel');
    MsPerPixel.textContent = `${modern.getMsPerPixel()} ms`;

    modern.on('dragged', (timestamp) => {
      TimeValue.textContent = format(timestamp, 'MM/DD/YYYY HH:mm:ss');
      const r = modern.getTimeRange();
      TimeRange.textContent = r ? `${format(r[0], 'HH:mm:ss')} ~ ${format(r[1], 'HH:mm:ss')}` : 'Undefined';
    });

    modern.on('zoom', () => {
      MsPerPixel.textContent = `${modern.getMsPerPixel()} ms`;
    });

    // --- Default theme demo ---
    const timezone = 'America/New_York';
    const defaultTimeline = new TimeLine('#TimelineDefault', {
      timezone,
      fill: false,
      zoom: 4,
    });

    defaultTimeline.draw({
      currentTime: 1651829413000,
      areas: [{
        startTime: 1651827433000,
        endTime: 1651829413000,
        bgColor: '#f897aa'
      },{
        startTime: 1651829533000,
        endTime: 1651832533000,
      }],
    });
  </script>
</body>
</html>
